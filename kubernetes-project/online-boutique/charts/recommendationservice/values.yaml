replicaCount: 1

image:
  repository: registry.gitlab.unige.ch/pereira_oct/docker-project/recommendationservice
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8082

env:
  - name: PORT
    value: "8082"
  - name: PRODUCT_CATALOG_SERVICE_ADDR
    value: "productcatalogservice:3550"
  - name: DISABLE_PROFILER
    value: "1"