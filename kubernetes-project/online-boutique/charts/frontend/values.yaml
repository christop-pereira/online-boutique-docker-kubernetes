replicaCount: 1

image:
  repository: registry.gitlab.unige.ch/pereira_oct/docker-project/frontend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

env:
  - name: PORT
    value: "8080"
  - name: PRODUCT_CATALOG_SERVICE_ADDR
    value: "productcatalogservice.boutique-backend.svc.cluster.local:3550"
  - name: CURRENCY_SERVICE_ADDR
    value: "currencyservice.boutique-backend.svc.cluster.local:7000"
  - name: CART_SERVICE_ADDR
    value: "cartservice.boutique-backend.svc.cluster.local:7070"
  - name: RECOMMENDATION_SERVICE_ADDR
    value: "recommendationservice.boutique-backend.svc.cluster.local:8080"
  - name: CHECKOUT_SERVICE_ADDR
    value: "checkoutservice.boutique-backend.svc.cluster.local:5050"
  - name: SHIPPING_SERVICE_ADDR
    value: "shippingservice.boutique-backend.svc.cluster.local:50051"
  - name: AD_SERVICE_ADDR
    value: "adservice.boutique-backend.svc.cluster.local:9555"
  - name: SHOPPING_ASSISTANT_SERVICE_ADDR
    value: "shoppingassistantservice.boutique-backend.svc.cluster.local:8080"